name: マネージャーレポート 本送信

on:
  # 手動ボタンのみ（確認後に実行）
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: Googleサービスアカウントキーを書き出し
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > config/service-account.json

      - name: ① 財務データ・コメント取得
        run: node scripts/fetch-manager-report.js
        env:
          SPREADSHEET_ID:          ${{ secrets.SPREADSHEET_ID }}
          COMMENT_SPREADSHEET_ID:  ${{ secrets.COMMENT_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ./config/service-account.json

      - name: ② HTMLメール生成（AIコメント整文）
        run: node scripts/generate-manager-email.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: ③ 本送信（大西店長宛）
        run: node scripts/send-manager-email.js
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MANAGER_EMAIL:      ${{ secrets.MANAGER_EMAIL }}
          SEND_MODE:          send
