name: マネージャーレポート プレビュー生成

on:
  # 毎月第1木曜 7:00 JST（UTC 22:00 = 前日水曜）
  # 第1木曜 = 1〜7日のうち木曜日
  schedule:
    - cron: '0 22 1-7 * 3'
  # 手動実行（テスト・確認用）
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: Googleサービスアカウントキーを書き出し
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > config/service-account.json

      - name: ① 各店舗KPIデータ取得
        run: node scripts/fetch-data.js
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ./config/service-account.json

      - name: ① 各店舗月次売上取得（日別スプレッドシート）
        run: node scripts/fetch-store-sales.js
        env:
          FUJIMIDAI_SALES_ID:   ${{ secrets.FUJIMIDAI_SALES_ID }}
          NAKAMURASHI_SALES_ID: ${{ secrets.NAKAMURASHI_SALES_ID }}
          SAKURADAI_SALES_ID:   ${{ secrets.SAKURADAI_SALES_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ./config/service-account.json

      - name: ② 財務データ・コメント取得
        run: node scripts/fetch-manager-report.js
        env:
          SPREADSHEET_ID:          ${{ secrets.SPREADSHEET_ID }}
          COMMENT_SPREADSHEET_ID:  ${{ secrets.COMMENT_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ./config/service-account.json

      - name: ③ HTMLメール生成（AIコメント整文）
        run: node scripts/generate-manager-email.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: ④ プレビューメール送信（自分宛）
        run: node scripts/send-manager-email.js
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SEND_MODE:          preview
